name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isIssue = context.payload.issue !== undefined;
            const sender = context.payload.sender.login;
            const repo = context.repo;

            // Check if first-time contributor
            const { data: issues } = await github.rest.issues.listForRepo({
              ...repo,
              creator: sender,
              state: 'all'
            });

            if (issues.length <= 1) {
              if (isIssue) {
                await github.rest.issues.createComment({
                  ...repo,
                  issue_number: context.payload.issue.number,
                  body: `👋 Hi @${sender}, thanks for opening your first issue!
                  
**Before we proceed, please check:**
- [ ] Have you read [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md)?
- [ ] Is this issue already listed? Check [existing issues](../issues)
- [ ] Is this a GSSoC 2026 contribution? Add the \`gssoc2026\` label

A maintainer will review this soon. Thank you for contributing! 🚀`
                });
              } else {
                await github.rest.issues.createComment({
                  ...repo,
                  issue_number: context.payload.pull_request.number,
                  body: `👋 Hi @${sender}, thanks for your first PR!

**Please confirm before we review:**
- [ ] Have you read [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md)?
- [ ] All tests pass locally: \`cd backend && pytest -v\`
- [ ] This PR is linked to an issue: \`Fixes #issue-number\`
- [ ] No duplicate work — check open PRs

We'll review shortly. Welcome to QyverixAI! 🎉`
                });
              }
            }
