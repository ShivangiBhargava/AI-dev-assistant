<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QyverixAI — AI Developer Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/svg+xml" href="../assets/icon.svg">
  <link rel="alternate icon" type="image/x-icon" href="public/favicon.ico">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script>
    (function() {
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('qyx_theme') || (systemDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <style>
    /* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════════ */
    :root {
      --bg: #0a0c10;
      --bg2: #0f1117;
      --bg3: #161b24;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --text: #e8eaf0;
      --text2: #8892a4;
      --text3: #4a5568;
      --accent: #5b9cf6;
      --accent2: #7c3aed;
      --green: #22d47b;
      --yellow: #f5c842;
      --red: #f25757;
      --orange: #f5923e;
      --r: 12px;
      --r2: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --shadow2: 0 2px 8px rgba(0, 0, 0, 0.3);
      --font-ui: 'Inter', sans-serif;
      --font-disp: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg: #f4f6fb;
      --bg2: #ffffff;
      --bg3: #eef1f7;
      --border: rgba(0, 0, 0, 0.07);
      --border2: rgba(0, 0, 0, 0.13);
      --text: #111827;
      --text2: #4b5563;
      --text3: #9ca3af;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      --shadow2: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* ═══════════════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
    }

    ::selection {
      background: var(--accent);
      color: #fff
    }

    *:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
      box-shadow: 0 0 0 4px rgba(91, 156, 246, 0.4);
      border-radius: 2px;
    }

    /* existing styles omitted for brevity (unchanged) */

    /* DOWNLOAD PNG button styles */
    .download-png-btn {
      padding: 8px 10px;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #fff;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .download-png-btn[disabled], .download-png-btn.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .download-png-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <!-- existing body content (unchanged) -->

  <!-- App HTML omitted for brevity (keeps original content) -->

  <!-- html2canvas and Download PNG logic -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNa5w8j+2m6qJv1nVw6j2QpGd2b0b0Yq6sK0Z6b1G6K7Y1zQ1+8s4Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    (function () {
      function createButton() {
        const btn = document.createElement('button');
        btn.className = 'download-png-btn';
        btn.type = 'button';
        btn.innerHTML = '<span class="download-png-label">Download PNG</span>';
        return btn;
      }

      function createSpinner() {
        const s = document.createElement('span');
        s.className = 'download-png-spinner';
        s.style.display = 'none';
        return s;
      }

      function formatFilename() {
        const ts = new Date().toISOString().replace(/[:.]/g, '-');
        return `qyverix-analysis-${ts}.png`;
      }

      async function captureElementToPNG(el) {
        const maxHeight = 3000;
        const elHeight = el.scrollHeight || el.clientHeight || el.offsetHeight;
        const devicePR = window.devicePixelRatio || 1;
        const scale = Math.min(2, (devicePR * Math.min(1, maxHeight / Math.max(elHeight, 1))));
        const canvas = await html2canvas(el, { scale: scale, useCORS: true, backgroundColor: getComputedStyle(document.body).backgroundColor });
        return canvas.toDataURL('image/png');
      }

      function showToast(message) {
        try {
          // lightweight toast
          let t = document.getElementById('qy-toast');
          if (!t) {
            t = document.createElement('div');
            t.id = 'qy-toast';
            t.style.position = 'fixed';
            t.style.right = '20px';
            t.style.bottom = '20px';
            t.style.background = 'rgba(0,0,0,0.7)';
            t.style.color = '#fff';
            t.style.padding = '10px 14px';
            t.style.borderRadius = '8px';
            t.style.zIndex = 99999;
            document.body.appendChild(t);
          }
          t.textContent = message;
          t.style.opacity = '1';
          setTimeout(() => { t.style.opacity = '0'; }, 4000);
        } catch (e) { console.log('toast failed', e); }
      }

      function attachButton() {
        // Find a sensible place in the results UI — prefer panel header's actions
        const resultPanel = document.querySelector('.result-content') || document.querySelector('.result-pane');
        if (!resultPanel) return;
        const panel = resultPanel.closest('.panel') || resultPanel.parentElement;
        const header = panel ? panel.querySelector('.panel-header') : null;
        const actions = header ? header.querySelector('.panel-actions') : null;
        const container = actions || header || panel || document.body;

        // Avoid adding multiple times
        if (container.querySelector('.download-png-btn')) return;

        const btn = createButton();
        const spinner = createSpinner();
        btn.prepend(spinner);

        btn.addEventListener('click', async function () {
          try {
            btn.setAttribute('disabled', '');
            spinner.style.display = 'inline-block';
            const elToCapture = document.querySelector('.result-content') || document.querySelector('.result-pane');
            if (!elToCapture) throw new Error('Results panel not found');
            const dataUrl = await captureElementToPNG(elToCapture);
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = formatFilename();
            document.body.appendChild(a);
            a.click();
            a.remove();
            showToast('Downloaded analysis PNG');
          } catch (err) {
            console.error(err);
            showToast('Failed to capture PNG: ' + (err.message || err));
          } finally {
            spinner.style.display = 'none';
            btn.removeAttribute('disabled');
          }
        });

        // Insert into UI
        if (actions) {
          actions.appendChild(btn);
        } else if (header) {
          header.appendChild(btn);
        } else {
          container.appendChild(btn);
        }
      }

      // Wait for DOM + potential dynamic UI render
      document.addEventListener('DOMContentLoaded', function () {
        // Try immediately and also after short delay if UI hasn't rendered.
        attachButton();
        setTimeout(attachButton, 800);
        setTimeout(attachButton, 2000);
      });
    })();
  </script>
</body>

</html>
